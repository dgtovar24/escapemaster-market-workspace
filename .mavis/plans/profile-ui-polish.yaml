  - id: fix-user-dashboard
    title: 'UserDashboard.tsx: divisor stats + icono empty + bottom dock + dedupe tabs'
    assigned_to: users-dgtovar-work-marketplace--developer
    verified_by: users-dgtovar-work-marketplace--reviewer
    max_retries: 2
    prompt: |
      Eres el producer de 1 archivo del sub-repo `web/frontend` de EscapeMaster.

      ## Working directory y rama
      - cd `/Users/dgtovar/Work/marketplace`
      - Rama de trabajo: crea `git switch -c fix/profile-ui-polish-B` desde `main`
      - Tu único archivo a tocar: `web/frontend/src/components/react/UserDashboard.tsx`
      - NO toques otros archivos (profile.astro lo lleva otro producer en paralelo)
      - Conventional commits. Cuando termines, haz commit local con mensaje `fix(dashboard): polish stats divider + empty icon + dedupe tabs`
      - NO push, NO PR — sólo commit local. El orquestador decide merge.

      ## Issues a resolver EN ESTE ARCHIVO

      ### Issue 1 — Línea divisoria ausente entre "Jugadas" y "Escapadas"

      Bloque grid de stats (líneas ~697-739):
      ```
      <div className="grid grid-cols-3 sm:grid-cols-5 divide-x divide-gray-100">
        {[...jugadas, escapadas, tasa, reseñas, fotos].map(...)}
      </div>
      ```

      Diagnóstico probable: el `divide-x` de Tailwind v4 con `divide-gray-100` (color casi imperceptible) puede no renderizarse claramente entre la primera y segunda columna cuando el grid es `grid-cols-3` (mobile) y los items hiddenOnMobile (reseñas/fotos) hacen wrap visual.

      Decisión recomendada:
      - Mantén `divide-x divide-gray-200` (más visible que gray-100 — sube contraste), o
      - Si consideras que el grid es inconsistente entre breakpoints, reemplaza `divide-x` por bordes explícitos en cada celda con `border-l first:border-l-0`. Sea cual sea, asegúrate de que el divisor entre Jugadas (idx 0) y Escapadas (idx 1) ES VISIBLE al menos en mobile (3 cols).
      - Si el problema viene de que `hideOnMobile: true` en reseñas/fotos hace wrap a una segunda fila en mobile, esos items NO deberían ocultarse — el flag `hideOnMobile` no se está usando en el render actual. Considera implementar `hideOnMobile` con `hidden sm:block` o `<div className="hidden sm:contents">` en las celdas correspondientes para que el wrap no rompa el divisor. Documenta tu decisión en el código con un comentario.

      ### Issue 4 — Confusión "Notificaciones" / "Avisos" + dedupe con sidebar

      Las pestañas centrales (líneas ~743-783) tienen un `<TabButton>` con `label={lang === 'en' ? 'Notifications' : 'Avisos'}` (línea ~775).

      **Decisión arquitectónica unificada** (compartida con el producer paralelo de profile.astro):
      - El sidebar de `profile.astro` ya tiene un item "Notificaciones" que apuntaba a `?tab=notifications`. **ESE item será ELIMINADO** por el otro producer.
      - Para evitar el duplicado y unificar el término en español, debes:
        - **RENOMBRAR** la pestaña "Avisos" → "Notificaciones" (en `lang === 'en'` ya es "Notifications", mantén ambos).
        - **ELIMINAR** la pestaña "Ajustes" (`activeTab === "settings"`) de las `<TabButton>` y del `switch` de render correspondiente (líneas ~777-782 y ~983-1030 con `<TabButton>` + bloque `activeTab === "settings" && (...)`). El sidebar de profile.astro conserva el enlace "Ajustes" que va a `/profile/settings`, que es la experiencia canónica de settings.
        - Quita "Ajustes" del array `initialTab` (línea ~390) y del `if (t === 'notifications' || t === 'settings' || ...)`.
        - Estado global: tras tu cambio, `activeTab` aceptable: `'bookings' | 'routes' | 'achievements' | 'credits' | 'notifications'`. Quita `'settings'` del type union (línea ~402).

      ### Issue 5 — Icono de sobre (Mail) en empty state de "Mis Reservas"

      Bloque ~818-832:
      ```
      <div className="text-center py-12 sm:py-16 bg-gray-50 rounded-xl sm:rounded-2xl">
        <div className="w-12 h-12 sm:w-16 sm:h-16 mx-auto mb-4 flex items-center justify-center rounded-2xl bg-gray-100">
          <Mail size={28} className="text-gray-400" />
        </div>
        <p className="text-sm sm:text-base text-gray-500">{labels.noBookings}</p>
        ...
      </div>
      ```

      Reemplaza `<Mail size={28} ...>` por un icono coherente con la pestaña (que ya usa `Calendar`):
      - `<Calendar size={28} className="text-gray-400" />` — opción preferida.
      - Alternativa: `<Ticket />` o `<Clock />` si encajan mejor con "reserva".
      - Tras el cambio, **quita `Mail` del import** (línea ~32) si ya no se usa en otro sitio del archivo.

      Valida que `Mail` no aparezca en otros lugares del archivo antes de quitarlo: `grep -n "Mail" src/components/react/UserDashboard.tsx` desde tu working dir.

      ### Issue 6 — Artefacto visual: dock negro recortado en el borde inferior

      El usuario reportó un "menú negro flotante cortado a la mitad" asomando en el centro-inferior. Esto NO está en el código que has visto del UserDashboard ni en profile.astro por lo que se ve.

      Investigación obligatoria:
      - Busca elementos con `fixed`, `inset-x-`, `bottom-`, `dock`, `floating` en `web/frontend/src/layouts/Layout.astro`, `web/frontend/src/components/layouts/*`, y archivos globales (`src/styles/global.css`, `src/components/Header*`, `src/components/NotificationsPanel*`).
      - Revisa el navegador con Playwright en `/es/profile` (con sesión iniciada) y captura pantalla. Identifica el origen del dock.
      - Posibles causas: componente de barra mobile que se renderiza en desktop por error, elemento `fixed` sin `overflow-hidden` en el main, banner/chrome de Astro dev overlay, extensión del navegador, etc.
      - Si está en este repo: arregla el estilo (típicamente `hidden md:block` si es mobile-only, o `overflow-hidden` en el contenedor padre si es un clip bug).
      - Si NO está en este repo (es overlay del browser o extensión): documenta tu investigación en el deliverable pero NO hagas cambios invasivos.

      Implementación: deja el archivo limpio y, si la causa está fuera de tu archivo asignado, explica en el deliverable dónde está y cómo reproducir. NO escribas cambios fuera de UserDashboard.tsx.

      ## Constraints (obliga)
      - Tailwind v4 con tokens `tropical-*` para primarios/acento.
      - Mantén compatibilidad i18n (es/en) — al renombrar "Avisos" → "Notificaciones", asegúrate que `lang === "en"` sigue mostrando "Notifications".
      - Mobile-first, touch targets ≥44px, NO rompas `client:load` ni el flujo de `userRoutes`/`bookings`.
      - NO añadas dependencias nuevas.
      - NO hagas cambios en `NotificationsPanel.tsx` salvo si estrictamente necesario para Issue 6; si lo tocas, documéntalo.

      ## Deliverable
      Reporta al final:
      1. Diff resumido por issue (qué líneas/cambios).
      2. Hash del commit local.
      3. Para Issue 6: árbol de búsqueda de elementos fixed/dock y conclusión (dentro-fuera de este archivo) + captura visual si tienes Playwright.
      4. Verificación rápida de que NO rompes tipos TypeScript (puedes correr `npx tsc --noEmit -p web/frontend/tsconfig.json` o equivalente desde el repo).
    verify_prompt: |
      Verifica el commit del producer sobre `web/frontend/src/components/react/UserDashboard.tsx` en la rama `fix/profile-ui-polish-B`.

      Procedimiento independiente (NO leas el reporte del producer):

      1. `git -C /Users/dgtovar/Work/marketplace log fix/profile-ui-polish-B --oneline -5` — confirma commit con prefijo `fix(dashboard):`.
      2. `git -C /Users/dgtovar/Work/marketplace diff main..fix/profile-ui-polish-B -- web/frontend/src/components/react/UserDashboard.tsx` — inspecciona el diff.
      3. Verifica las 8 condiciones:
         a. La grid de stats (línea ~697) usa un mecanismo que produce divisor VISIBLE entre Jugadas y Escapadas, en mobile Y desktop. Cambia `divide-gray-100` por algo más visible o reescribe con bordes explícitos.
         b. La pestaña central "Avisos" ahora tiene label `Notificaciones` en español (y `Notifications` en en) — busca `Avisos` en el archivo post-cambio y confirma que NO aparece.
         c. La pestaña central "Ajustes" (`<TabButton active={activeTab === "settings"} ...>` y el bloque `{activeTab === "settings" && ...}` ) está COMPLETAMENTE ELIMINADA.
         d. El array `initialTab` y el type union ya no contienen `'settings'`.
         e. El icono del empty state de Reservas (`<Mail .../>`) ya NO aparece — fue reemplazado por Calendar/Ticket/Clock.
         f. Si `Mail` ya no se usa en ningún otro sitio del archivo, fue removido del import.
         g. Los tokens `tropical-*` se respetan y no hay hex hardcoded en zonas de UI principal.
         h. Para Issue 6: hay documentación en el deliverable del producer explicando dónde está el dock y si está dentro o fuera del archivo. Si dentro, fue arreglado.
      4. Type-check opcional: `cd web/frontend && npx tsc --noEmit` (no debe romper por el cambio).
      5. Si el producer tocó NotificationsPanel u otros archivos fuera de scope, RECHAZA — debe quedarse en su archivo.

      Reporta PASS/FAIL con bullets por cada condición. Si FAIL, lista específicamente qué falta.

