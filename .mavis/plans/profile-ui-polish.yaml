      ## Issues a resolver EN ESTE ARCHIVO

      ### Issue 2 — Barra XP visualmente engañosa cuando XP=0

      La barra de XP en la tarjeta del usuario (líneas ~142-152):
      ```
      <div class="h-1.5 sm:h-2 bg-gray-200 rounded-full overflow-hidden">
        <div id="xpProgress" class="h-full bg-amber-400 transition-all duration-500" style="width: 0%"></div>
      </div>
      <p class="text-[10px] sm:text-xs text-gray-400 mt-1 text-center" id="xpToNext">0 / 500 XP</p>
      ```

      Problema: cuando el usuario tiene 0 XP, el `<div>` interno tiene `width: 0%` (vacío, correcto) pero el contenedor padre `bg-gray-200` se ve completamente relleno en gris sólido. Visualmente da la sensación de "100% deshabilitado" en lugar de vacío.

      Decisión de diseño (recomendada, ciñete o propone alternativa equivalente):
      - Cuando progress === 0, mostrar el contenedor con un fondo más sutil: por ejemplo `bg-gray-100` o `bg-tropical-secondary/5` en lugar de `bg-gray-200`. Y el indicador interno en `0%` debería mantener un color de marca tenue.
      - Alternativa aceptable: añadir un patrón diagonal sutil `bg-[linear-gradient(...)]` que dé pista de "vacío/trayecto".
      - **No** rellenes la barra con un color que parezca progreso real al 0%.

      Implementa el cambio y deja un comentario de Astro `{/* XP bar: subtle bg at 0% to avoid looking filled */}`.

      ### Issue 3 — Dedupe "Ajustes" y "Notificaciones"

      El array `menuItems` del sidebar (líneas ~64-70) contiene los 5 items:
      ```
      { key: 'history', icon: 'clock', href: `/${lang}/profile/history` },
      { key: 'favorites', icon: 'heart', href: `/${lang}/profile/favorites` },
      { key: 'notifications', icon: 'bell', href: `/${lang}/profile?tab=notifications` },
      { key: 'editProfile', icon: 'user', href: `/${lang}/profile/edit` },
      { key: 'settings', icon: 'settings', href: `/${lang}/profile/settings` },
      ```

      **Decisión arquitectónica unificada para TODO el perfil** (compartida con el producer paralelo de UserDashboard.tsx):

      - Sidebar = navegación a páginas dedicadas full-page (history, favorites, edit).
      - Pestañas centrales del `UserDashboard` = vistas activas del dashboard (bookings, routes, achievements, credits, notifications).
      - **Ajustes**: el sidebar enlaza a `/profile/settings` (página completa) — MANTENER. La pestaña central "Ajustes" del dashboard será ELIMINADA por el otro producer (es redundante con el sidebar).
      - **Notificaciones**: la pestaña central "Avisos" del UserDashboard será RENOMBRADA a "Notificaciones" por el otro producer (unifica el término). El sidebar item `notifications` (que apunta a `?tab=notifications`) es **REDUNDANTE** y debe ELIMINARSE — con la pestaña central activa, no hace falta enlace adicional.

      Por tanto:
      - **ELIMINA** `{ key: 'notifications', icon: 'bell', href: `/${lang}/profile?tab=notifications` },` del array.
      - **MANTÉN** `{ key: 'settings', icon: 'settings', href: `/${lang}/profile/settings` },`.
      - Resultado esperado del array: 4 items (history, favorites, editProfile, settings).
      - El `icons` Record sigue siendo válido aunque ya no se use 'bell' — déjalo como está, no limpies a menos que sea trivial.

      Si tu worker session del equipo paralelo ya hizo cambios en este archivo, REBASA sobre su rama (`git rebase`) o mergea antes de commitear. Si no, sólo commitea tus cambios.

      ## Constraints (obliga)
      - Respeta tokens tropical-* — NUNCA hex hardcoded ni `text-gray-*` para CTAs/fondos primarios. Para XP bar sutil se acepta `gray-*` semánticamente.
      - NO añadas dependencias nuevas.
      - Mantén compatibilidad i18n (es/en) — los textos no son los cambiados, pero asegúrate de no romper traducciones existentes.
      - Mobile-first: el cambio de la barra XP no debe romper el breakpoint `sm:`.

      ## Deliverable
      Reporta al final:
      1. Diff resumido (qué líneas/cambios).
      2. Hash del commit local.
      3. Captura visual si tienes Playwright, o descripción del render esperado en mobile y desktop.
    verify_prompt: |
      Verifica el commit del producer sobre `web/frontend/src/pages/[lang]/profile.astro` en la rama `fix/profile-ui-polish-A`.

      Procedimiento independiente (NO leas el reporte del producer):

      1. `git -C /Users/dgtovar/Work/marketplace log fix/profile-ui-polish-A --oneline -5` — confirma que hay un commit con prefijo `fix(profile):`.
      2. `git -C /Users/dgtovar/Work/marketplace diff main..fix/profile-ui-polish-A -- web/frontend/src/pages/[lang]/profile.astro` — inspecciona el diff.
      3. Verifica las 6 condiciones:
         a. La barra XP ya NO usa `bg-gray-200` cuando progress=0, o hay un patrón alternativo que NO confunde con lleno.
         b. `menuItems` quedó con exactamente 4 entradas (history, favorites, editProfile, settings) — `notifications` removido.
         c. `settings` (key) sigue presente y apunta a `/profile/settings` (sidebar canónico de Ajustes).
         d. No hay uso de `bg-gray-200` ni colores hex hardcoded.
         e. Ninguna otra sección del archivo fue tocada fuera de la barra XP y el `menuItems`.
         f. No hay nuevas dependencias en `package.json` del sub-repo.
      4. Build local opcional si lo crees necesario (`cd web/frontend && npm run build`).

      Reporta PASS/FAIL con bullets por cada condición. Si FAIL, lista específicamente qué línea o qué falta.

