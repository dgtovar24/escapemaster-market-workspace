      - fix-user-dashboard
    max_retries: 1
    prompt: |
      Eres el verificador final visual del plan. Confirma end-to-end que las 6 issues del perfil del jugador están corregidas.

      ## Setup
      - Las dos ramas productoras son `fix/profile-ui-polish-A` y `fix/profile-ui-polish-B`. Fusiona ambas en una rama local de verificación: `fix/profile-ui-polish-merged` desde `main`.
        ```
        git -C /Users/dgtovar/Work/marketplace switch -c fix/profile-ui-polish-merged main
        git -C /Users/dgtovar/Work/marketplace merge --no-ff fix/profile-ui-polish-A -m "merge UI polish A"
        git -C /Users/dgtovar/Work/marketplace merge --no-ff fix/profile-ui-polish-B -m "merge UI polish B"
        ```
      - Levanta el dev server: `cd web/frontend && npm run dev` (puerto 4321). `playwright` MCP server debería estar disponible.
      - Loguéate con la cuenta de prueba de Diego o el usuario real que tengas disponible.

      ## Checklist visual (cada item PASS/FAIL con captura)

      Issue 1 — Divisor "Jugadas"/"Escapadas":
      - Navega a `/es/profile` con viewport mobile (390x844) y desktop (1280x800).
      - El divisor vertical entre la primera y segunda celda de stats (Jugadas | Escapadas) DEBE verse claramente. Captura.

      Issue 2 — Barra XP al 0% no engaña:
      - Con un usuario que tenga `total_xp = 0`, la barra debe verse VACÍA (sin parecer rellena de gris oscuro). Captura.

      Issue 3 — Un solo lugar para Ajustes:
      - En el sidebar, NO debe aparecer "Ajustes" si quedó duplicado. En el panel central NO debe haber pestaña "Ajustes". La forma canónica de entrar a ajustes es el sidebar.

      Issue 4 — Un solo lugar para Notificaciones, mismo label:
      - Buscar "Notificaciones" + "Avisos" en pantalla. Sólo debe aparecer una etiqueta: "Notificaciones".

      Issue 5 — Icono empty state de "Mis Reservas":
      - En la pestaña "Mis Reservas" sin reservas, el icono debe ser Calendar (o Ticket/Clock), NO un sobre (Mail).

      Issue 6 — Dock recortado inferior:
      - En viewport mobile y desktop, captura pantalla completa y verifica que NO aparece ningún menú negro flotante cortado en el borde inferior.

      ## Salida esperada
      Reporte estructurado con:
      - Tabla 6 filas: Issue | PASS/FAIL | Nota | Captura (path local).
      - Veredicto final PASS si todos pasan, FAIL si alguno falla. Si FAIL, lista los issues fallidos y la causa probable.
      - Si un issue requiere más trabajo fuera de scope, indícalo claramente.
